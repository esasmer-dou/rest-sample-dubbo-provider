name: rest-sample-dubbo-provider

services:
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - checkpoint_timeout=15min
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - min_wal_size=256MB
      - -c
      - max_wal_size=1GB
    environment:
      POSTGRES_DB: reactor_sample
      POSTGRES_USER: reactor
      POSTGRES_PASSWORD: reactor
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reactor -d reactor_sample"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - rest-sample-postgres-data:/var/lib/postgresql/data

  provider:
    build:
      context: ..
      dockerfile: docker/images/Dockerfile
    image: rest-sample-dubbo-provider:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DUBBO_PROVIDER_HOST: rest-sample-dubbo-provider
      DUBBO_PROVIDER_BIND_HOST: 0.0.0.0
      DUBBO_PROVIDER_PORT: 20880
      REACTOR_DUBBO_REGISTRY_ENABLED: "false"
      SAMPLE_DB_JDBC_URL: jdbc:postgresql://postgres:5432/reactor_sample
      SAMPLE_DB_USERNAME: reactor
      SAMPLE_DB_PASSWORD: reactor
      SAMPLE_DB_MAXIMUM_POOL_SIZE: 2
      SAMPLE_DB_MINIMUM_IDLE: 0
      SAMPLE_DB_SCHEMA_INIT: "true"
      SAMPLE_DB_WARMUP: "true"
    ports:
      - "20880:20880"
    restart: unless-stopped

volumes:
  rest-sample-postgres-data:
