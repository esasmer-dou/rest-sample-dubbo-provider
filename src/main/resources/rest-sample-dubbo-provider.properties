# Minimum local profile.
# This file is intentionally small. Use -Dreactor.config.file=src/main/resources/config/production.properties
# or REACTOR_CONFIG_FILE for production and advanced overrides.

# Dubbo provider. Local default does not require ZooKeeper.
dubbo.provider.application-name=rest-sample-dubbo-provider
dubbo.provider.host=127.0.0.1
dubbo.provider.bind-host=127.0.0.1
dubbo.provider.port=20880
dubbo.security.serialize.allowedClassList=com.reactor.rust.dubbo.sample.dto.
dubbo.provider.executor.thread-pool=eager
dubbo.provider.executor.core-threads=1
dubbo.provider.executor.max-threads=8
dubbo.provider.executor.queue-capacity=16
dubbo.provider.executor.idle-timeout-ms=30000
dubbo.provider.executor.io-threads=1
reactor.dubbo.registry-enabled=false
reactor.dubbo.registry-address=zookeeper://127.0.0.1:2181
reactor.dubbo.registry-root=dubbo

# Safety-critical DB limits are active even when no external overlay is supplied.
# Additional catalog/query method overrides live in advanced-tuning.properties.
dubbo.provider.service.default.max-concurrent=16
dubbo.provider.service.CustomerQueryService.max-concurrent=2
dubbo.provider.service.CustomerCommandService.max-concurrent=2
dubbo.provider.service.CustomerCommandService.method.createCustomer.max-concurrent=2
dubbo.provider.service.CustomerCommandService.method.createCustomerTyped.max-concurrent=2
dubbo.provider.service.CustomerCommandService.method.patchCustomerSegment.max-concurrent=1
dubbo.provider.service.CustomerCommandService.method.patchCustomerStatus.max-concurrent=1
dubbo.provider.service.CustomerCommandService.method.patchCustomerStatusTyped.max-concurrent=1
dubbo.provider.service.CustomerCommandService.method.deleteCustomer.max-concurrent=1

# PostgreSQL + HikariCP. Pool defaults come from java-rust-dubbo provider JDBC helper.
sample.db.jdbc-url=jdbc:postgresql://127.0.0.1:15432/reactor_sample
sample.db.username=reactor
sample.db.password=reactor
sample.db.driver-class-name=org.postgresql.Driver

# Demo behavior. In real production, schema migration belongs outside the hot process.
sample.db.schema-init=true
sample.db.warmup=true
