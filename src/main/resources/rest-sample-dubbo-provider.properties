# Dubbo provider
dubbo.provider.application-name=rest-sample-dubbo-provider
dubbo.provider.host=127.0.0.1
dubbo.provider.bind-host=127.0.0.1
dubbo.provider.port=20880
reactor.dubbo.registry-address=zookeeper://127.0.0.1:2181
reactor.dubbo.registry-root=dubbo

# Per-interface provider execution bulkheads.
# This limits concurrent service method executions; it does not create one extra thread pool per interface.
dubbo.provider.service.default.max-concurrent=16
dubbo.provider.service.NestedCatalogService.max-concurrent=16
dubbo.provider.service.CustomerQueryService.max-concurrent=2

# PostgreSQL + HikariCP
sample.db.jdbc-url=jdbc:postgresql://127.0.0.1:15432/reactor_sample
sample.db.username=reactor
sample.db.password=reactor
sample.db.driver-class-name=org.postgresql.Driver
sample.db.pool-name=rest-sample-provider-db
sample.db.postgresql.application-name=rest-sample-dubbo-provider

# Low-RSS bounded pool values.
sample.db.maximum-pool-size=2
sample.db.minimum-idle=0
sample.db.connection-timeout-ms=1000
sample.db.validation-timeout-ms=1000
sample.db.idle-timeout-ms=30000
sample.db.max-lifetime-ms=300000
sample.db.leak-detection-threshold-ms=0
sample.db.initialization-fail-timeout-ms=-1
sample.db.auto-commit=true
sample.db.read-only=false
sample.db.register-mbeans=false

# Demo behavior. In real production, schema migration belongs outside the hot process.
sample.db.schema-init=true
sample.db.warmup=true

# Dubbo/Netty runtime system properties. Values live here; code only knows keys.
io.netty.allocator.numDirectArenas=1
io.netty.allocator.numHeapArenas=1
io.netty.recycler.maxCapacityPerThread=0
io.netty.noPreferDirect=true
dubbo.application.logger=slf4j
dubbo.application.qos.enable=false
dubbo.metrics.enable=false
dubbo.tracing.enabled=false
